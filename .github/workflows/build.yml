name: Build ArrowsGO

on:
  push:
    branches:
      - dev
      - main
      - master

  pull_request:
    branches:
      - dev
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: devkitpro/devkitarm:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install 3DS dependencies
        run: |
          dkp-pacman -S --noconfirm --needed 3ds-dev

      # Syntax / compile check on DEV
      - name: Compile check
        run: |
          make

